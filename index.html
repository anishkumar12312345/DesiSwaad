<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DesiSwaad</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("bg.jpg") no-repeat center center/cover;
    height: 100vh;
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    /* FIX */
    pointer-events: none;
}

/* Content */
.content {
    text-align: center;
    pointer-events: auto;
}

/* Logo */
.logo {
    font-size: 50px;
    color: gold;
    font-weight: bold;
    text-shadow: 0 0 20px gold;
}

/* Tagline */
.tagline {
    color: white;
    font-size: 20px;
    margin-top: 10px;
}

/* Buttons container */
.buttons {
    margin-top: 30px;
    display: flex;
    gap: 15px;
    justify-content: center;
}

/* Buttons */
button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

/* Signup button */
.signup {
    background: orange;
    color: white;
}

/* Login button */
.login {
    background: green;
    color: white;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="overlay">
    <div class="content">

        <div class="logo">DesiSwaad</div>
        <div class="tagline">देश का असली स्वाद</div>

        <div class="buttons">
            <button class="signup" onclick="goSignup()">Sign Up</button>
            <button class="login" onclick="goLogin()">Login</button>
        </div>

    </div>
</div>

<script>
function goSignup(){
    window.location.href = "./signup.html";
}

function goLogin(){
    window.location.href = "./login.html";
}
</script>

</body>
</html>
