<!DOCTYPE html>
<html>
<head>
<title>Login - DesiSwaad</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("bg.jpg") no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: rgba(0,0,0,0.7);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
}

h2 {
    color: white;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 20px;
    background: lightgreen;
    font-size: 16px;
    cursor: pointer;
}

.signup {
    color: white;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <!-- SIGNUP OPTION -->
    <div class="signup" onclick="goSignup()">
        New user? Signup
    </div>
</div>

<script>

// LOGIN FUNCTION
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let savedUser = localStorage.getItem("username");
    let savedPass = localStorage.getItem("password");

    if(user === savedUser && pass === savedPass){
        alert("Login Success");
        window.location.href = "home.html";
    } else {
        alert("Invalid Login");
    }
}

// GO TO SIGNUP PAGE
function goSignup(){
    window.location.href = "signup.html";
}

</script>

</body>
</html>
